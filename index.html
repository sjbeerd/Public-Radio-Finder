<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Finder</title>
    <style>
        :root { --blue: #003087; --red: #d62828; }
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: #fff; }
        #app { padding: 20px; width: 100%; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 2.2rem; font-weight: 900; color: var(--blue); margin: 15px 0; }
        .freq { font-size: 4rem; font-weight: 300; color: var(--red); }
        .dist { font-size: 1rem; color: #bbb; margin-top: 20px; }
        #refresh-btn { margin-top: 25px; padding: 12px 24px; border-radius: 25px; border: 1px solid #eee; background: #fafafa; font-size: 0.8rem; color: #666; font-weight: 600; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Scanning Airwaves...</div>
        <div id="name" class="name"></div>
        <div id="freq" class="freq"></div>
        <div id="meta" class="dist"></div>
        <button id="refresh-btn" onclick="location.reload()">Update Location</button>
    </div>

    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                // maximumAge: 0 forces the phone to get a fresh GPS reading, not a cached one.
                navigator.geolocation.getCurrentPosition(findStation, (err) => {
                    document.getElementById('status').innerText = "GPS Error: " + err.message;
                }, { enableHighAccuracy: true, timeout: 7000, maximumAge: 0 });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // Search for NPR-tagged stations within the US
                const cacheBuster = Date.now();
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?countrycode=US&tag=npr&limit=500&cb=${cacheBuster}`);
                const stations = await res.json();

                // UNIVERSAL PRIORITY: These keywords identify "News/Talk" NPR stations vs "Music" NPR stations
                const newsKeywords = ['news', 'talk', 'information', 'public radio', 'npr news'];
                const musicKeywords = ['classical', 'jazz', 'music', 'classic'];
                
                let bestMatch = null;
                let minAdjustedDist = Infinity;
                let trueDistance = 0;

                stations.forEach(s => {
                    if (s.geo_lat && s.geo_long) {
                        const d = getD(lat, lon, s.geo_lat, s.geo_long);
                        const content = (s.name + s.tags).toLowerCase();
                        
                        // Scoring Logic:
                        // 1. News/Talk stations get a 50% distance "bonus" (they seem closer)
                        // 2. Classical/Music stations get a 20% distance "penalty" (they seem further)
                        // This pushes News to the top without ignoring Music if it's the only thing available.
                        let weight = 1.0;
                        if (newsKeywords.some(k => content.includes(k))) weight = 0.5;
                        else if (musicKeywords.some(k => content.includes(k))) weight = 1.2;

                        const adjustedDist = d * weight;

                        if (adjustedDist < minAdjustedDist) {
                            minAdjustedDist = adjustedDist;
                            trueDistance = d;
                            bestMatch = s;
                        }
                    }
                });

                if (bestMatch) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    document.getElementById('name').innerText = bestMatch.name.split(/[-|]/)[0].trim();
                    
                    const fMatch = (bestMatch.name + " " + bestMatch.tags).match(/\d{2,3}\.\d/);
                    document.getElementById('freq').innerText = fMatch ? fMatch[0] + " FM" : "Check Dial";
                    
                    document.getElementById('meta').innerText = `${bestMatch.state || ''} (${trueDistance.toFixed(1)} miles away)`;
                }
            } catch (e) { 
                document.getElementById('status').innerText = "Network Error"; 
            }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
