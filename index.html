<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Finder</title>
    <style>
        :root { --blue: #003087; --red: #d62828; }
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: #fff; color: #333; }
        #app { padding: 20px; width: 100%; max-width: 400px; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 2.2rem; font-weight: 900; color: var(--blue); margin: 15px 0; line-height: 1.1; }
        .freq { font-size: 4rem; font-weight: 300; color: var(--red); }
        .dist { font-size: 1rem; color: #bbb; margin-top: 20px; }
        button { margin-top: 30px; padding: 12px 24px; border-radius: 25px; border: 1px solid #eee; background: #fafafa; font-size: 0.8rem; color: #666; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Pinging NPR...</div>
        <div id="name" class="name"></div>
        <div id="freq" class="freq"></div>
        <div id="meta" class="dist"></div>
        <button onclick="location.reload()">Refresh Signal</button>
    </div>

    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findNPRStation, (err) => {
                    document.getElementById('status').innerText = "GPS Error: " + err.message;
                }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            }
        };

        async function findNPRStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // Using the official NPR station finder API logic
                // This fetches stations near your coordinates directly from NPR's database
                const url = `https://secure.npr.org/getStations?lat=${lat}&lon=${lon}`;
                const response = await fetch(url);
                const data = await response.json();

                // The NPR API returns an array called 'stations'
                // We filter for stations where the primary genre is News or News/Talk
                const allStations = data.stations || [];
                
                let bestMatch = allStations.find(s => {
                    const genre = (s.market_type || "").toLowerCase();
                    const title = (s.name || "").toLowerCase();
                    // Avoid anything that explicitly labels itself as Classical
                    return !title.includes('classical') && !title.includes('music');
                });

                // Fallback to the first station if no "News" specific filter hit
                if (!bestMatch) bestMatch = allStations[0];

                if (bestMatch) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    document.getElementById('name').innerText = bestMatch.call || bestMatch.name;
                    
                    // NPR API provides the frequency directly in the 'frequency' field
                    const frequency = bestMatch.frequency || "Check Dial";
                    const band = bestMatch.band || "FM";
                    document.getElementById('freq').innerText = `${frequency} ${band}`;
                    
                    document.getElementById('meta').innerText = `${bestMatch.city}, ${bestMatch.state}`;
                } else {
                    document.getElementById('status').innerText = "No NPR Station Found Nearby";
                }
            } catch (e) {
                document.getElementById('status').innerText = "NPR API Connection Error";
            }
        }
    </script>
</body>
</html>
