<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Public Radio Finder</title>
    <style>
        :root { 
            --blue: #003087; --red: #d62828; 
            --bg: #ffffff; --text: #333333; --card: #fafafa; --border: #eeeeee;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333333;
            }
        }

        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: var(--bg); color: var(--text); transition: background 0.3s ease; overflow: hidden; }
        #app { padding: 20px; width: 100%; max-width: 400px; }
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        
        .name-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; min-height: 3.5rem; }
        .name { font-size: 2.8rem; font-weight: 900; color: var(--blue); line-height: 1.1; }
        .type-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); text-transform: uppercase; font-weight: bold; opacity: 0.7; color: var(--text); }
        
        .freq { font-size: 4.5rem; font-weight: 200; color: var(--red); letter-spacing: -1px; margin: 5px 0; }
        .dist { font-size: 1rem; margin-top: 10px; font-weight: 600; }
        
        .sig-strong { color: #2d6a4f; } 
        .sig-fringe { color: #d4a373; }  
        .sig-weak { color: #888; }      

        /* Filter Toggle Styles */
        #filter-container { margin-top: 15px; display: none; }
        .filter-btn { background: var(--card); border: 1px solid var(--border); color: #888; padding: 6px 12px; border-radius: 15px; font-size: 0.75rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .filter-active { background: var(--blue); border-color: var(--blue); color: white; }

        #zip-container { margin-top: 25px; display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; width: 100px; text-align: center; background: var(--bg); color: var(--text); outline: none; }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 30px; }
        .btn-main { padding: 12px 28px; border-radius: 25px; border: 1px solid var(--border); background: var(--card); font-size: 0.85rem; color: var(--text); font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 180px; }
        .btn-zip { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 8px; margin-left: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Locating Signal...</div>
        
        <div id="result-area">
            <div class="name-container">
                <div id="name" class="name"></div>
                <span id="type-tag" class="type-tag" style="display:none;"></span>
            </div>
            <div id="freq" class="freq"></div>
            <div id="meta" class="dist"></div>
            
            <div id="filter-container">
                <button id="filter-btn" class="filter-btn" onclick="toggleFilter()">Show All Stations</button>
            </div>
        </div>

        <div id="zip-container">
            <p style="margin-top:0; font-size: 0.9rem;">GPS unavailable. Enter ZIP:</p>
            <div style="display:flex; justify-content:center; align-items:center;">
                <input type="number" id="zip-input" placeholder="08108" pattern="\d*">
                <button class="btn-zip" onclick="useZip()">GO</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn-main" onclick="refreshSignal()">Refresh Scan</button>
        </div>
    </div>

    <script>
        let currentLat = null;
        let currentLon = null;
        let newsOnly = false;

        const STATIONS = [
    // --- PENNSYLVANIA (WHYY, WITF, WXPN, WVIA) ---
    {"call":"WHYY","freq":"90.9","lat":39.95,"lon":-75.17,"city":"Philadelphia","type":"Primary"},
    {"call":"WXPN","freq":"88.5","lat":40.01,"lon":-75.31,"city":"Philadelphia","type":"Boutique"}, // Triple-A Music
    {"call":"WRTI","freq":"90.1","lat":40.01,"lon":-75.21,"city":"Philadelphia","type":"Boutique"}, // Jazz/Classical
    {"call":"WITF","freq":"89.5","lat":40.27,"lon":-76.88,"city":"Harrisburg","type":"Primary"},
    {"call":"WVIA","freq":"89.9","lat":41.34,"lon":-75.76,"city":"Scranton","type":"Primary"},
    {"call":"WPSU","freq":"91.5","lat":40.79,"lon":-77.86,"city":"State College","type":"Primary"},
    {"call":"WQLN","freq":"91.3","lat":42.13,"lon":-80.09,"city":"Erie","type":"Primary"},
    {"call":"WQED","freq":"89.3","lat":40.44,"lon":-79.95,"city":"Pittsburgh","type":"Primary"},
    {"call":"WYEP","freq":"91.3","lat":40.43,"lon":-79.92,"city":"Pittsburgh","type":"Boutique"}, // Alternative

    // --- NEW JERSEY (NJPR Network & WHYY Relays) ---
    {"call":"WNJT","freq":"88.1","lat":40.22,"lon":-74.76,"city":"Trenton","type":"Primary"},
    {"call":"WNJM","freq":"89.9","lat":39.70,"lon":-74.22,"city":"Manahawkin","type":"Relay"},
    {"call":"WNJP","freq":"88.5","lat":40.49,"lon":-74.45,"city":"New Brunswick","type":"Relay"},
    {"call":"WNJB","freq":"89.3","lat":39.43,"lon":-75.23,"city":"Bridgeton","type":"Relay"},
    {"call":"WNJY","freq":"89.3","lat":41.12,"lon":-74.57,"city":"Netcong","type":"Relay"},
    {"call":"WNJO","freq":"90.3","lat":39.54,"lon":-74.34,"city":"Toms River","type":"Relay"},

    // --- NEW YORK (WNYC, WAMC, WXXI) ---
    {"call":"WNYC","freq":"93.9","lat":40.75,"lon":-73.98,"city":"New York City","type":"Primary"},
    {"call":"WFUV","freq":"90.7","lat":40.86,"lon":-73.88,"city":"Bronx","type":"Boutique"}, // AAA Music
    {"call":"WAMC","freq":"90.3","lat":42.65,"lon":-73.76,"city":"Albany","type":"Primary"},
    {"call":"WOSR","freq":"91.7","lat":41.45,"lon":-74.42,"city":"Middletown","type":"Relay"},
    {"call":"WAMK","freq":"90.9","lat":41.93,"lon":-73.99,"city":"Kingston","type":"Relay"},
    {"call":"WCEL","freq":"91.9","lat":44.69,"lon":-73.46,"city":"Plattsburgh","type":"Relay"},
    {"call":"WXXI","freq":"91.5","lat":43.16,"lon":-77.61,"city":"Rochester","type":"Primary"},
    {"call":"WBFO","freq":"88.7","lat":42.89,"lon":-78.88,"city":"Buffalo","type":"Primary"},
    {"call":"WRVO","freq":"89.9","lat":43.45,"lon":-76.51,"city":"Oswego","type":"Primary"},

    // --- DELAWARE & MARYLAND (WDDE, WYPR) ---
    {"call":"WDDE","freq":"91.1","lat":39.16,"lon":-75.52,"city":"Dover, DE","type":"Primary"},
    {"call":"WYPR","freq":"88.1","lat":39.30,"lon":-76.61,"city":"Baltimore, MD","type":"Primary"},
    {"call":"WSDL","freq":"90.7","lat":38.37,"lon":-75.59,"city":"Ocean City, MD","type":"Relay"},
    {"call":"WSCL","freq":"89.5","lat":38.37,"lon":-75.59,"city":"Salisbury, MD","type":"Boutique"}, // Fine Arts

    // --- DC & VIRGINIA (WAMU, Radio IQ, WHRV) ---
    {"call":"WAMU","freq":"88.5","lat":38.94,"lon":-77.08,"city":"Washington, DC","type":"Primary"},
    {"call":"WETA","freq":"90.9","lat":38.89,"lon":-77.06,"city":"Washington, DC","type":"Boutique"}, // Classical
    {"call":"WVTF","freq":"89.1","lat":37.27,"lon":-79.94,"city":"Roanoke, VA","type":"Primary"},
    {"call":"WVTU","freq":"89.3","lat":38.03,"lon":-78.48,"city":"Charlottesville, VA","type":"Relay"},
    {"call":"WRIQ","freq":"89.7","lat":37.33,"lon":-77.10,"city":"Richmond, VA","type":"Relay"},
    {"call":"WHRV","freq":"89.5","lat":36.85,"lon":-76.29,"city":"Norfolk, VA","type":"Primary"},

    // --- WEST VIRGINIA (WVPB Network) ---
    {"call":"WVPN","freq":"88.5","lat":38.35,"lon":-81.63,"city":"Charleston","type":"Primary"},
    {"call":"WVPM","freq":"90.9","lat":39.63,"lon":-79.95,"city":"Morgantown","type":"Relay"},
    {"call":"WVEP","freq":"88.9","lat":39.46,"lon":-77.96,"city":"Martinsburg","type":"Relay"},
    {"call":"WVPW","freq":"88.9","lat":38.99,"lon":-80.22,"city":"Buckhannon","type":"Relay"},

    // --- NEW ENGLAND (Maine, NH, VT, MA, RI, CT) ---
    {"call":"WBUR","freq":"90.9","lat":42.35,"lon":-71.11,"city":"Boston, MA","type":"Primary"},
    {"call":"WGBH","freq":"89.7","lat":42.35,"lon":-71.12,"city":"Boston, MA","type":"Primary"},
    {"call":"WFCR","freq":"88.5","lat":42.38,"lon":-72.52,"city":"Amherst, MA","type":"Primary"},
    {"call":"WNPN","freq":"89.3","lat":41.83,"lon":-71.41,"city":"Providence, RI","type":"Primary"},
    {"call":"WNPR","freq":"90.5","lat":41.76,"lon":-72.68,"city":"Hartford, CT","type":"Primary"},
    {"call":"WEVO","freq":"89.1","lat":43.20,"lon":-71.53,"city":"Concord, NH","type":"Primary"},
    {"call":"WVPS","freq":"107.9","lat":44.47,"lon":-73.21,"city":"Burlington, VT","type":"Primary"},
    {"call":"WMEA","freq":"90.1","lat":43.66,"lon":-70.25,"city":"Portland, ME","type":"Primary"},
    {"call":"WMEP","freq":"90.5","lat":44.80,"lon":-68.77,"city":"Bangor, ME","type":"Relay"}
];

        window.onload = refreshSignal;

        function refreshSignal() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        currentLat = pos.coords.latitude;
                        currentLon = pos.coords.longitude;
                        findSignal();
                    },
                    () => showZipFallback(),
                    { enableHighAccuracy: true, timeout: 6000 }
                );
            } else {
                showZipFallback();
            }
        }

        function toggleFilter() {
            newsOnly = !newsOnly;
            const btn = document.getElementById('filter-btn');
            if (newsOnly) {
                btn.innerText = "News Only Mode";
                btn.classList.add('filter-active');
            } else {
                btn.innerText = "Show All Stations";
                btn.classList.remove('filter-active');
            }
            findSignal();
        }

        function showZipFallback() {
            document.getElementById('status').innerText = "Location Offline";
            document.getElementById('zip-container').style.display = "block";
            document.getElementById('result-area').style.opacity = "0.15";
        }

        async function useZip() {
            const zip = document.getElementById('zip-input').value;
            if (zip.length < 5) return;
            try {
                const res = await fetch(`https://api.zippopotam.us/us/${zip}`);
                const data = await res.json();
                currentLat = parseFloat(data.places[0].latitude);
                currentLon = parseFloat(data.places[0].longitude);
                document.getElementById('zip-container').style.display = "none";
                document.getElementById('result-area').style.opacity = "1";
                findSignal();
            } catch (e) { alert("Invalid ZIP."); }
        }

        function findSignal() {
            if (!currentLat || !currentLon) return;

            let best = null;
            let minD = Infinity;

            // Filter logic
            const availableStations = newsOnly 
                ? STATIONS.filter(s => s.type !== "Boutique")
                : STATIONS;

            availableStations.forEach(s => {
                const d = getD(currentLat, currentLon, s.lat, s.lon);
                if (d < minD) {
                    minD = d;
                    best = s;
                }
            });

            if (best) {
                const meta = document.getElementById('meta');
                const tag = document.getElementById('type-tag');
                document.getElementById('status').innerText = "Public Radio Finder";
                document.getElementById('filter-container').style.display = "block";
                
                document.getElementById('name').innerText = best.call;
                tag.innerText = best.type;
                tag.style.display = "inline-block";
                
                document.getElementById('freq').innerText = best.freq + " FM";
                
                let strength = "sig-weak";
                let statusTxt = "Weak Signal";
                if (minD < 30) { strength = "sig-strong"; statusTxt = "Strong Signal"; }
                else if (minD < 60) { strength = "sig-fringe"; statusTxt = "Fringe Signal"; }
                
                meta.className = "dist " + strength;
                meta.innerText = `${statusTxt} • ${minD.toFixed(1)} miles away`;
            }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
