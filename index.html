<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Road Trip Finder</title>
    <style>
        :root {
            --npr-blue: #003087;
            --npr-red: #d62828;
            --white: #ffffff;
            --gray: #f4f4f9;
        }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--white);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        #app-container {
            padding: 30px;
            width: 100%;
        }
        .status-label {
            font-size: 1rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .station-name {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--npr-blue);
            line-height: 1.1;
            margin: 10px 0;
            word-wrap: break-word;
        }
        .frequency-display {
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--npr-red);
            margin: 5px 0;
        }
        .distance-tag {
            font-size: 1.1rem;
            color: #aaa;
            margin-top: 20px;
        }
        .loading-spinner {
            color: var(--npr-blue);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="status" class="status-label">Locating Signal...</div>
        <div id="name" class="station-name"></div>
        <div id="freq" class="frequency-display"></div>
        <div id="meta" class="distance-tag"></div>
    </div>

    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                // Request high accuracy for better road trip results
                navigator.geolocation.getCurrentPosition(findStation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 10000
                });
            } else {
                document.getElementById('status').innerText = "GPS Not Supported";
            }
        };

        function handleError() {
            document.getElementById('status').innerText = "Enable Location Access";
        }

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // 1. Fetch 100 closest stations to current GPS
                const url = `https://de1.api.radio-browser.info/json/stations/search?lat=${lat}&long=${lon}&limit=100&hidebroken=true&order=distance`;
                const res = await fetch(url);
                const stations = await res.json();

                // 2. Define "Public Radio" DNA
                const publicKeywords = ['npr', 'public radio', 'public broadcasting', 'news/talk', 'university', 'college', 'wamc', 'whyy', 'wnyc', 'wamu', 'kcrw', 'kqed'];
                
                // 3. Find the first station in the list that matches our keywords
                let bestMatch = stations.find(s => {
                    const searchData = (s.name + s.tags).toLowerCase();
                    return publicKeywords.some(k => searchData.includes(k));
                });

                // 4. Fallback: If no public station found in top 100, just take the absolute closest
                if (!bestMatch) bestMatch = stations[0];

                if (bestMatch) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    
                    // Clean the name (remove stream info)
                    const cleanName = bestMatch.name.split(/[-|]/)[0].trim();
                    document.getElementById('name').innerText = cleanName;

                    // Extract frequency (e.g. 91.7) from name or tags
                    const freqMatch = (bestMatch.name + " " + bestMatch.tags).match(/\d{2,3}\.\d/);
                    document.getElementById('freq').innerText = freqMatch ? `${freqMatch[0]} FM` : "Check Dial";

                    // Show distance and state
                    const d = calculateDistance(lat, lon, bestMatch.geo_lat, bestMatch.geo_long);
                    document.getElementById('meta').innerText = `${bestMatch.state || ''} (${d.toFixed(1)} miles away)`;
                }
            } catch (e) { 
                document.getElementById('status').innerText = "Connection Error"; 
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8; // Miles
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
