<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Finder</title>
    <style>
        :root { --npr-blue: #003087; --npr-red: #d62828; }
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: #fff; }
        #app { padding: 20px; width: 100%; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 2.5rem; font-weight: 900; color: var(--npr-blue); margin: 15px 0; line-height: 1.1; }
        .freq { font-size: 3.5rem; font-weight: 300; color: var(--npr-red); }
        .dist { font-size: 1rem; color: #bbb; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Locating Signal...</div>
        <div id="name" class="name"></div>
        <div id="freq" class="freq"></div>
        <div id="meta" class="dist"></div>
    </div>

    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, () => {
                    document.getElementById('status').innerText = "Please enable GPS";
                }, { enableHighAccuracy: true });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // Fetch 100 closest stations globally
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?lat=${lat}&long=${lon}&limit=100&hidebroken=true&order=distance`);
                const stations = await res.json();

                // Keywords for NPR/Public Radio
                const keywords = ['npr', 'public radio', 'wamc', 'whyy', 'wnyc', 'wamu', 'wync', 'public broadcasting'];
                
                // Filter the list to find the BEST match nearby
                let matches = stations.filter(s => {
                    const data = (s.name + s.tags).toLowerCase();
                    return keywords.some(k => data.includes(k));
                });

                // Pick the closest NPR match. If none found in top 100, take the absolute closest.
                let best = matches.length > 0 ? matches[0] : stations[0];

                if (best) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    document.getElementById('name').innerText = best.name.split(/[-|]/)[0].trim();
                    
                    // Improved Frequency Finder
                    const fMatch = (best.name + " " + best.tags).match(/\d{2,3}\.\d/);
                    document.getElementById('freq').innerText = fMatch ? fMatch[0] + " FM" : "Search Dial";
                    
                    const d = getD(lat, lon, best.geo_lat, best.geo_long);
                    document.getElementById('meta').innerText = `${best.state || ''} (${d.toFixed(1)} miles away)`;
                }
            } catch (e) { document.getElementById('status').innerText = "Search Failed"; }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
