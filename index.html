<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Public Radio Finder</title>
    <style>
        :root { 
            --blue: #003087; --red: #d62828; 
            --bg: #ffffff; --text: #333333; --card: #fafafa; --border: #eeeeee;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333333;
            }
        }

        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: var(--bg); color: var(--text); transition: background 0.3s ease; overflow: hidden; }
        #app { padding: 20px; width: 100%; max-width: 400px; height: 90vh; display: flex; flex-direction: column; }
        
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; flex-shrink: 0; font-weight: bold; }
        
        #result-area { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 10px 0; min-height: 100px; }
        .station-entry { padding: 20px 0; border-bottom: 1px solid var(--border); }
        .station-entry:last-child { border-bottom: none; }

        .name-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .name { font-size: 2.8rem; font-weight: 900; color: var(--blue); line-height: 1.1; }
        .type-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); text-transform: uppercase; font-weight: bold; opacity: 0.7; color: var(--text); }
        
        .city-state { font-size: 1.1rem; color: #666; font-weight: 500; margin-bottom: 5px; }
        .freq { font-size: 3.5rem; font-weight: 200; color: var(--red); letter-spacing: -1px; margin: 0; }
        .dist { font-size: 1rem; margin-top: 5px; font-weight: 600; }
        
        .sig-strong { color: #2d6a4f; } 
        .sig-fringe { color: #d4a373; }  
        .sig-weak { color: #888; }      

        #filter-container { margin: 15px 0; flex-shrink: 0; display: none; }
        .filter-group { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 25px; padding: 4px; gap: 4px; }
        .filter-btn { flex: 1; border: none; background: transparent; color: #888; padding: 10px 2px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
        .filter-btn.active { background: var(--blue); color: white; }

        /* Startup & Fallback UI */
        #startup-container { margin: auto; display: flex; flex-direction: column; gap: 20px; width: 100%; align-items: center; justify-content: center; height: 100%; }
        
        .btn-gps { background: var(--blue); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 80%; max-width: 250px; box-shadow: 0 4px 10px rgba(0,48,135,0.2); }
        .btn-gps:active { transform: scale(0.98); }

        .zip-row { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1.1rem; width: 120px; text-align: center; background: var(--bg); color: var(--text); outline: none; }
        .btn-zip { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .controls { display: flex; justify-content: center; margin-top: 10px; flex-shrink: 0; display: none; }
        .btn-main { padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 0.8rem; color: var(--text); font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">READY TO SCAN</div>
        
        <div id="startup-container">
            <button class="btn-gps" onclick="requestGPS()">📍 Use GPS Location</button>
            <div style="color: #888; font-size: 0.9rem; margin: 10px 0;">— or —</div>
            <div class="zip-row">
                <input type="text" id="zip-input" inputmode="numeric" pattern="[0-9]*" placeholder="ZIP Code" maxlength="5">
                <button class="btn-zip" onclick="useZip()">Search</button>
            </div>
        </div>

        <div id="result-area"></div>

        <div id="filter-container">
            <div class="filter-group">
                <button id="btn-primary" class="filter-btn" onclick="setMode('primary')">Primary Only</button>
                <button id="btn-all" class="filter-btn active" onclick="setMode('all')">All Stations</button>
                <button id="btn-boutique" class="filter-btn" onclick="setMode('boutique')">Boutique Only</button>
            </div>
        </div>

        <div id="controls" class="controls">
            <button class="btn-main" onclick="resetApp()">Start Over</button>
        </div>
    </div>

    <script src="stations.js"></script>

    <script>
        let currentLat = null;
        let currentLon = null;
        let currentMode = 'all';

        // Called when user explicitly taps the GPS button
        function requestGPS() {
            document.getElementById('status').innerText = "REQUESTING LOCATION...";
            document.getElementById('startup-container').style.display = "none";
            
            try {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            currentLat = pos.coords.latitude;
                            currentLon = pos.coords.longitude;
                            findSignal();
                        },
                        function(err) {
                            alert("Location access denied or unavailable. Please use ZIP code.");
                            resetApp();
                        },
                        { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
                    );
                } else {
                    alert("Your browser does not support Geolocation.");
                    resetApp();
                }
            } catch (e) {
                alert("An error occurred starting GPS.");
                resetApp();
            }
        }

        async function useZip() {
            const zip = document.getElementById('zip-input').value;
            if (zip.length < 5) {
                alert("Please enter a valid 5-digit ZIP code.");
                return;
            }
            
            document.getElementById('status').innerText = "SEARCHING ZIP...";
            document.getElementById('startup-container').style.display = "none";

            try {
                const res = await fetch('https://api.zippopotam.us/us/' + zip);
                if (!res.ok) throw new Error("Invalid ZIP");
                const data = await res.json();
                currentLat = parseFloat(data.places[0].latitude);
                currentLon = parseFloat(data.places[0].longitude);
                findSignal();
            } catch (e) { 
                alert("Could not find that ZIP code. Try again.");
                resetApp();
            }
        }

        function resetApp() {
            currentLat = null;
            currentLon = null;
            document.getElementById('status').innerText = "READY TO SCAN";
            document.getElementById('startup-container').style.display = "flex";
            document.getElementById('result-area').innerHTML = "";
            document.getElementById('filter-container').style.display = "none";
            document.getElementById('controls').style.display = "none";
            document.getElementById('zip-input').value = "";
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.filter-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + mode).classList.add('active');
            findSignal();
        }

        function findSignal() {
            if (!currentLat || !currentLon) return;

            if (typeof STATIONS === 'undefined') {
                document.getElementById('status').innerText = "ERROR: STATIONS DATA MISSING";
                return;
            }

            let bestStations = [];
            let minD = 999999;

            let filteredList = STATIONS;
            if (currentMode === 'primary') {
                filteredList = STATIONS.filter(function(s) { return s.type === "Primary"; });
            } else if (currentMode === 'boutique') {
                filteredList = STATIONS.filter(function(s) { return s.type === "Boutique"; });
            }

            filteredList.forEach(function(s) {
                const d = getD(currentLat, currentLon, s.lat, s.lon);
                
                if (d < (minD - 0.1)) {
                    minD = d;
                    bestStations = [s];
                } else if (Math.abs(d - minD) <= 0.1) {
                    if (currentMode === 'boutique') {
                        bestStations.push(s);
                    } else if (bestStations.length === 0) {
                        bestStations = [s];
                    }
                }
            });

            renderResults(bestStations, minD);
        }

        function renderResults(stations, distance) {
            const area = document.getElementById('result-area');
            area.innerHTML = '';
            document.getElementById('status').innerText = "PUBLIC RADIO FINDER";
            document.getElementById('filter-container').style.display = "block";
            document.getElementById('controls').style.display = "flex";

            if (stations.length === 0) {
                area.innerHTML = "<div style='margin-top:40px; color:#888;'>No stations found in this category.</div>";
                return;
            }

            stations.forEach(function(s) {
                const div = document.createElement('div');
                div.className = 'station-entry';
                
                let strength = "sig-weak";
                let statusTxt = "Weak Signal";
                if (distance < 30) { strength = "sig-strong"; statusTxt = "Strong Signal"; }
                else if (distance < 60) { strength = "sig-fringe"; statusTxt = "Fringe Signal"; }

                div.innerHTML = `
                    <div class="name-container">
                        <div class="name">${s.call}</div>
                        <span class="type-tag">${s.type}</span>
                    </div>
                    <div class="city-state">${s.city}</div>
                    <div class="freq">${s.freq} FM</div>
                    <div class="dist ${strength}">${statusTxt} • ${distance.toFixed(1)} miles</div>
                `;
                area.appendChild(div);
            });
        }

        // Changed ** to Math.pow() for bulletproof legacy compatibility
        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.pow(Math.sin(dLat / 2), 2) + 
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.pow(Math.sin(dLon / 2), 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>
</body>
</html>
