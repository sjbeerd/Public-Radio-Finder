<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPR Finder</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #ffffff;
            color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        #container { padding: 20px; }
        .status { font-size: 1.1rem; color: #666; margin-bottom: 10px; }
        .station-name { font-size: 3rem; font-weight: 800; color: #003087; margin: 10px 0; }
        .frequency { font-size: 1.8rem; color: #d62828; }
        .dist { margin-top: 15px; color: #888; }
    </style>
</head>
<body>
    <div id="container">
        <div id="status" class="status">Locating...</div>
        <div id="name" class="station-name"></div>
        <div id="freq" class="frequency"></div>
        <div id="meta" class="dist"></div>
    </div>
    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, () => {
                    document.getElementById('status').innerText = "Please enable location.";
                });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            try {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?countrycode=US&tag=npr&hidebroken=true&limit=250');
                const stations = await res.json();
                let closest = null;
                let minD = Infinity;

                stations.forEach(s => {
                    if (s.geo_lat && s.geo_long) {
                        const d = getD(lat, lon, s.geo_lat, s.geo_long);
                        if (d < minD) { minD = d; closest = s; }
                    }
                });

                if (closest) {
                    document.getElementById('status').innerText = "Closest Station:";
                    document.getElementById('name').innerText = closest.name.split('-')[0].trim();
                    document.getElementById('freq').innerText = closest.state || "NPR";
                    document.getElementById('meta').innerText = `${minD.toFixed(1)} miles away`;
                }
            } catch (e) { document.getElementById('status').innerText = "API Error."; }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
