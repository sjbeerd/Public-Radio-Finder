<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPR Finder</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #ffffff;
            color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        #container { padding: 20px; }
        .status { font-size: 1.1rem; color: #666; margin-bottom: 10px; }
        .station-name { font-size: 3rem; font-weight: 800; color: #003087; margin: 10px 0; }
        .frequency { font-size: 1.8rem; color: #d62828; }
        .dist { margin-top: 15px; color: #888; }
    </style>
</head>
<body>
    <div id="container">
        <div id="status" class="status">Locating...</div>
        <div id="name" class="station-name"></div>
        <div id="freq" class="frequency"></div>
        <div id="meta" class="dist"></div>
    </div>
    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, () => {
                    document.getElementById('status').innerText = "Please enable location.";
                });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // NEW STRATEGY: Ask the API for stations within a radius of your GPS
                // This fetches the 50 closest stations to YOU, regardless of tags.
                const url = `https://de1.api.radio-browser.info/json/stations/search?lat=${lat}&long=${lon}&limit=50&hidebroken=true&order=distance`;
                
                const res = await fetch(url);
                const stations = await res.json();

                // Look through those 50 closest stations for common Public Radio keywords
                const publicRadioKeywords = ['npr', 'public', 'wamc', 'whyy', 'wnyc', 'waze', 'wamu', 'university', 'college'];
                
                let bestMatch = stations.find(s => {
                    const name = s.name.toLowerCase();
                    const tags = s.tags.toLowerCase();
                    return publicRadioKeywords.some(keyword => name.includes(keyword) || tags.includes(keyword));
                });

                // Fallback: If no "Public" keywords found, just show the absolute closest station
                if (!bestMatch && stations.length > 0) {
                    bestMatch = stations[0];
                }

                if (bestMatch) {
                    document.getElementById('status').innerText = "Closest Station Found:";
                    document.getElementById('name').innerText = bestMatch.name;
                    document.getElementById('freq').innerText = bestMatch.state || "Public Radio";
                    
                    // Recalculate distance for the display
                    const d = getD(lat, lon, bestMatch.geo_lat, bestMatch.geo_long);
                    document.getElementById('meta').innerText = `${d.toFixed(1)} miles away`;
                } else {
                    document.getElementById('status').innerText = "No stations found nearby.";
                }
            } catch (e) { 
                document.getElementById('status').innerText = "API Connection Error."; 
            }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
